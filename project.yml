name: OTPBeyondBorders

options:
  bundleIdPrefix: com.otpbb
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    WATCHOS_DEPLOYMENT_TARGET: "10.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  OTPKit:
    path: OTPKit

targets:
  OTPBeyondBorders:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: Shared
      - path: Widget/Sources/OTPWidgetContent.swift
      - path: App/Resources/Assets.xcassets
    resources:
      - App/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpbb.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: App/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: App/Resources/OTPBeyondBorders.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: OTPKit
      - target: OTPWidget
      - sdk: WidgetKit.framework

  OTPWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget/Sources
    resources:
      - Widget/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpbb.ios.widget
        INFOPLIST_FILE: Widget/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Widget/Resources/OTPWidget.entitlements
    dependencies:
      - package: OTPKit
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  OTPWatch:
    type: application
    platform: watchOS
    sources:
      - Watch/Sources
    resources:
      - Watch/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpbb.watch
        INFOPLIST_FILE: Watch/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - package: OTPKit

schemes:
  OTPBeyondBorders:
    build:
      targets:
        OTPBeyondBorders: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  OTPWatch:
    build:
      targets:
        OTPWatch: all
    run:
      config: Debug
    archive:
      config: Release
